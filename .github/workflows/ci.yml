name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Schema drift check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run check:schema-drift
