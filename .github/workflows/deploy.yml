name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "schema/**"
      - "scripts/**"
      - "public/**"
      - "Dockerfile"
      - "fly.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      - name: Schema drift check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm check:schema-drift

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ vars.FLY_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:release-notes
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
